events {}

http {
    include /etc/nginx/mime.types;
    server {
        listen 80;
        charset utf-8;

        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback — Astro generates static HTML
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively
        location /_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
